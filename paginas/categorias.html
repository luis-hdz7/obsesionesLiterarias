<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/componentes.css">
    <link rel="stylesheet" href="../css/paginasEstilos/categorias.css">
    <link rel="icon" href="../images/icn.jpg">
    <title>Categorías</title>
</head>
<body>
    <header>
        <div>
            <h1 class="logo">Obsesiones Literarias</h1>
        </div>
        <nav>
            <div class="nav-links">
                <a href="../index.html">Home</a>
                <a href="#">Categorias</a>
                <a href="contacto.html">Contactanos</a>
            </div>
            <div class="nav-butones">
                <button class="theme">
                    <i class="fa-solid fa-sun changeTheme"></i>
                </button>
                <button class="carrito-principal">
                    <i class="fa-solid fa-cart-shopping"></i>
                </button>
            </div>
        </nav>
    </header>
    <section class="hero">
        <h2>Sumergete en el Mundo de la Literatura</h2>
    </section>
    <section class="frases-contenedor contenido-centrado">
        <div class="contenedor-interno contenido-centrado">
            <p id="cita" class="contenido-centrado"></p>
            <p id="autor" class="contenido-centrado"></p>
            <button type="button" id="boton-cambiar-cita" class="btn-generico">Siguiente Cita</button>
        </div>
    </section>
    <section class="libros-contenedores">
        <div class="titulo-contenedor">
            <h2>Conoce Nuestros Libros Destacados</h2>
        </div>
        <div class="container contenedor-libro-destacados book-container">
            
        </div>
    </section>
    <section class="categorias">
        <div class="titulo-seccion">
            <h3>Conoce Nuestras Categorías</h3>
        </div>
        <div class="categorias-opciones">
            <figure class="categoria-img" data-categoria="novelas">
                <img src="../icons/novels.png" alt="Icono de Novelas">
                <figcaption>Novela</figcaption>
            </figure >
            <figure class="categoria-img" data-categoria="nicaraguenses">
                <img src="../icons/nicaragua.png" alt="Icono de Libros Nicaraguenses">
                <figcaption>Nacionales</figcaption>
            </figure>
            <figure class="categoria-img" data-categoria="autoayuda">
                <img src="../icons/selfHelp.png" alt="Icono de Libros de Autoayuda">
                <figcaption>Autoayuda</figcaption>
            </figure>
            <figure class="categoria-img" data-categoria="ciencia">
                <img src="../icons/science.png" alt="Icono de libros de Ciencia">
                <figcaption>Ciencia</figcaption>
            </figure>
            <figure class="categoria-img" data-categoria="historia">
                <img src="../icons/history-book.png" alt="Icono de libros de Historia">
                <figcaption>Historia</figcaption>
            </figure>
        </div>
    </section>
    <main class="libros-contenedores">
        <div class="container contenedor-libro book-container"></div>
    </main>
    <section class="contenedor-centrado-popUp-apagado"></section>
    <footer>
        <div class="container">
            <p>&copy; Obsesiones Literarias 2026</p>
            <div class="social-media">
                <a href="https://www.instagram.com/obse.sionesliterarias/" target="_blank">
                    <i class="fa-brands fa-instagram"></i>
                </a>
                <a href="https://wa.link/xs16t9" target="_blank">
                    <i class="fa-brands fa-whatsapp"></i>
                </a>
            </div>
        </div>
    </footer>
    <script src="../js/script.js" defer></script>
    <script src="../js/citas.js" defer></script>
</body>
</html>
